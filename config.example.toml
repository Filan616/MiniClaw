# Mini-Claw 默认配置文件
# 复制此文件到 ~/.mini-claw/config.toml 并填入你的配置

[provider]
provider = "deepseek"
api_key = "sk-your-api-key-here"
model = "deepseek-chat"
# base_url = ""  # 自定义 API 地址（可选）

[channels.feishu]
enabled = false
app_id = "cli_xxx"
app_secret = "your-app-secret"
verification_token = "your-verification-token"
encrypt_key = ""

[server]
host = "0.0.0.0"
port = 8000
public_url = "https://your-host.example.com"

[permissions]
default_level = "L2"
require_confirm = ["L3"]
deny_by_default = ["L4"]
shell_blacklist = ['rm\s+-rf\s+/', 'mkfs', ':\(\)\{']

[permissions.high_risk]
allow_explicit = false
allowed_command_templates = []

[[agents]]
id = "default"
system_prompt = "你是一个高效的个人助手，能调用工具帮用户完成各种任务。请用中文回复。"
tools = ["run_shell", "read_file", "write_file", "list_directory", "http_request"]

# 示例：运维专用 agent
# [[agents]]
# id = "ops"
# system_prompt = "你是运维专家，只做服务器运维相关任务。"
